<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1"
xmlns="http://www.w3.org/2000/svg"
xmlns:xlink="http://www.w3.org/1999/xlink"
x="0px"
y="0px"
viewBox="0 0 30 30"
style="enable-background:new 0 0 30 30;"
xml:space="preserve">

<defs>
  <style type="text/css">
    .bg{
      fill:#2D2D2D;
      stroke:#FFFFFF;
      stroke-width:0.6317;
      stroke-miterlimit:10;
    }

    .heart{
      fill:#FFFFFF;
    }

    .heart-breathe{
      animation:breathe 2.5s ease-in-out infinite;
      transform-origin:center;
      transform-box:fill-box;
    }

    @keyframes breathe{
      0%,100%{
        transform:scale(1);
        opacity:0.75;
      }

      50%{
        transform:scale(1.08);
        opacity:1;
      }
    }
  </style>
</defs>

<g>
  <path class="bg"
    d="M24.51,28.51H5.49c-2.21,0-4-1.79-4-4V5.49c0-2.21,1.79-4,4-4h19.03
    c2.21,0,4,1.79,4,4v19.03C28.51,26.72,26.72,28.51,24.51,28.51z"/>

  <g class="heart-breathe">
    <path class="heart"
      d="M15 23
      C14.5 22.5 6 16.5 6 11.5
      C6 8.8 8 7 10.5 7
      C12.2 7 13.6 7.9 15 9.3
      C16.4 7.9 17.8 7 19.5 7
      C22 7 24 8.8 24 11.5
      C24 16.5 15.5 22.5 15 23Z"/>
  </g>
</g>

</svg>
